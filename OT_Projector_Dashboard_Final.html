<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>OT Maturity — Live Room | Dragos</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:#080F0F;height:100vh;overflow:hidden;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;color:#E3E5E5}
.shell{display:flex;flex-direction:column;height:100vh}

/* Header */
.hdr{background:#000000;padding:0 40px;height:60px;flex-shrink:0;
  display:flex;align-items:center;justify-content:space-between}

.hdr-title{font-size:13px;color:#9FE1CB;letter-spacing:1.8px;font-weight:600;margin-left:18px}
.hdr-left{display:flex;align-items:baseline}
.hdr-right{display:flex;align-items:center;gap:20px}
.live-wrap{display:flex;align-items:center;gap:7px}
.live-dot{width:9px;height:9px;border-radius:50%;background:#00C78D;
  animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.65)}}
.live-label{font-size:11px;color:#00C78D;font-weight:700;letter-spacing:1px}
.counter-wrap{text-align:right}
.counter-num{font-size:28px;font-weight:800;color:#fff;line-height:1;transition:color .3s}
.counter-num.flash{color:#00CAC5}
.counter-label{font-size:10px;color:#9FE1CB;letter-spacing:1.2px}
.mock-badge{background:#2D1F00;border:1px solid #FFB300;border-radius:4px;
  padding:3px 9px;font-size:10px;font-weight:700;color:#FFB300;letter-spacing:1px}

/* Waiting */
.waiting{flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:16px}
.waiting-ring{width:52px;height:52px;border:3px solid #0D3030;
  border-top-color:#00CAC5;border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.waiting-text{font-size:20px;color:#3A5050;font-weight:500}
.waiting-sub{font-size:13px;color:#2A3A3A}

/* Main layout */
.main{flex:1;display:flex;min-height:0;gap:0}
.controls-col{flex:1;display:flex;flex-direction:column;
  justify-content:space-evenly;padding:12px 28px 12px 40px;min-height:0}
.industry-col{width:240px;flex-shrink:0;padding:16px 20px 16px 0;
  display:flex;flex-direction:column;gap:8px;border-left:1px solid #0C1E1E;
  padding-left:20px}

/* Control block */
.ctrl-block{display:flex;gap:20px;align-items:flex-start}
.ctrl-id{flex-shrink:0;width:190px;padding-top:2px}
.ctrl-badge{display:inline-block;background:#01605E;color:#FFB300;
  font-size:10px;font-weight:800;padding:2px 8px;border-radius:3px;
  letter-spacing:.5px;margin-bottom:4px}
.ctrl-name{font-size:14px;font-weight:700;color:#fff;line-height:1.25}
.ctrl-bars{flex:1;display:flex;flex-direction:column;gap:5px}

/* Bar row */
.bar-row{display:flex;align-items:center;gap:9px}
.bar-tier{width:142px;flex-shrink:0;font-size:10px;font-weight:600;
  text-align:right;letter-spacing:.3px}
.bar-track{flex:1;height:26px;background:#0C1E1E;border-radius:4px;
  overflow:hidden;position:relative}
.bar-fill{height:100%;border-radius:4px;display:flex;align-items:center;
  transition:width .7s cubic-bezier(.4,0,.2,1);min-width:0}
.bar-fill.flash{animation:barFlash .55s ease-out}
@keyframes barFlash{0%{filter:brightness(2.2)}100%{filter:brightness(1)}}
.bar-inner{font-size:11px;font-weight:700;padding:0 7px;white-space:nowrap;overflow:hidden}
.bar-pct{width:40px;flex-shrink:0;text-align:right;font-size:12px;font-weight:700}
.bar-n{width:44px;flex-shrink:0;font-size:10px;color:#2A4040}

/* Divider */
.ctrl-divider{height:1px;background:#0C1E1E;margin:0 0 0 210px}

/* Industry panel */
.ind-header{font-size:10px;color:#4A5568;font-weight:700;letter-spacing:1.2px;margin-bottom:4px}
.ind-row{display:flex;justify-content:space-between;align-items:center;
  padding:5px 8px;border-radius:5px;margin-bottom:3px}
.ind-name{font-size:11px;font-weight:500}
.ind-count{font-size:11px;font-weight:700}
.ind-bar-wrap{height:3px;background:#0C1E1E;border-radius:2px;margin-top:3px;overflow:hidden}
.ind-bar-fill{height:100%;border-radius:2px;transition:width .6s ease}

/* Footer */
.footer{flex-shrink:0;height:48px;padding:0 40px;background:#050C0C;
  border-top:1px solid #0C1E1E;display:flex;align-items:center;justify-content:space-between}
.legend{display:flex;gap:20px;align-items:center}
.leg-item{display:flex;align-items:center;gap:6px;font-size:11px;color:#4A5568}
.leg-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}

/* Toast */
.toast{position:fixed;top:68px;right:28px;background:#002A1A;
  border:1px solid #00C78D;border-radius:7px;padding:8px 14px;
  font-size:12px;color:#00C78D;font-weight:600;
  opacity:0;transform:translateY(-6px);
  transition:opacity .2s,transform .2s;pointer-events:none;z-index:100}
.toast.show{opacity:1;transform:translateY(0)}
</style>
</head>

  {label:"Early Stage",         threshold:1.0,  color:"#FFB300"},
  {label:"Building Foundations", threshold:2.0,  color:"#FFB300"},
  {label:"Operationalizing",    threshold:3.0,  color:"#00CAC5"},
  {label:"Optimizing",          threshold:4.0,  color:"#FFFFFF"},
  {label:"Optimized",           threshold:99,   color:"#FFFFFF"},
];

// Industry colors for the side panel
const IND_COLORS = ["#00CAC5","#FFB300","#00C78D","#7C3AED","#FF3B30","#049995","#FF9500","#5AC8FA"];

// ── Mock data ─────────────────────────────────────────────────────────────
const MOCK_ALL = [
  {industry:"Manufacturing",        scores:[1,1,0,1,1]},
  {industry:"Electric / Utilities", scores:[2,1,1,0,1]},
  {industry:"Oil & Gas",            scores:[1,2,1,1,0]},
  {industry:"Manufacturing",        scores:[0,1,0,0,1]},
  {industry:"Water & Wastewater",   scores:[2,2,1,1,2]},
  {industry:"Electric / Utilities", scores:[1,1,1,0,1]},
  {industry:"Oil & Gas",            scores:[2,1,2,1,1]},
  {industry:"Manufacturing",        scores:[1,0,1,1,0]},
  {industry:"Chemical",             scores:[3,2,2,1,2]},
  {industry:"Electric / Utilities", scores:[2,2,1,2,1]},
  {industry:"Manufacturing",        scores:[1,2,1,1,2]},
  {industry:"Oil & Gas",            scores:[2,1,1,1,1]},
  {industry:"Mining",               scores:[3,2,2,2,3]},
  {industry:"Manufacturing",        scores:[1,1,0,1,1]},
];
let mockIdx = 0;

// ── Data source ───────────────────────────────────────────────────────────
async function loadRoom() {
  if (CONFIG.MOCK_MODE) {
    if (mockIdx < MOCK_ALL.length) mockIdx++;
    return MOCK_ALL.slice(0, mockIdx);
  }
  try {
    const res  = await fetch(CONFIG.READ_URL);
    const text = await res.text();
    let json;
    try { json = JSON.parse(text); } catch(e) { return []; }
    const rows = json.value || json.body?.value || json.body || json || [];
    const arr = Array.isArray(rows) ? rows : [];

    const mapped = arr.filter(r => r && (r.CC01 !== undefined || r.OData__x0043_C01 !== undefined)).map(r => {
      const keys = Object.keys(r);
      const c01key = keys.find(k => k.endsWith('C01') || k.endsWith('C001') || k === 'CC01');
      const c02key = keys.find(k => k.endsWith('C02') || k.endsWith('C002') || k === 'CC02');
      const c03key = keys.find(k => k.endsWith('C03') || k.endsWith('C003') || k === 'CC03');
      const c04key = keys.find(k => k.endsWith('C04') || k.endsWith('C004') || k === 'CC04');
      const c05key = keys.find(k => k.endsWith('C05') || k.endsWith('C005') || k === 'CC05');
      return {
        industry: r.Industry || r.industry || "Other",
        scores: [
          Number(c01key ? r[c01key] : 0)||0,
          Number(c02key ? r[c02key] : 0)||0,
          Number(c03key ? r[c03key] : 0)||0,
          Number(c04key ? r[c04key] : 0)||0,
          Number(c05key ? r[c05key] : 0)||0,
        ],
      };
    });
    return mapped;
  } catch(e) { return []; }
}

// ── State ─────────────────────────────────────────────────────────────────
let prevCount = 0;
let builtUI   = false;

// ── Toast ─────────────────────────────────────────────────────────────────
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2400);
}

// ── Build control UI skeleton ─────────────────────────────────────────────
function buildUI() {
  const col = document.getElementById('controlsCol');
  col.innerHTML = '';
  CONTROLS.forEach((ctrl, ci) => {
    const block = document.createElement('div');
    block.className = 'ctrl-block';
    const idDiv = document.createElement('div');
    idDiv.className = 'ctrl-id';
    idDiv.innerHTML = `<div class="ctrl-badge">CC${ctrl.num}</div><div class="ctrl-name">${ctrl.name}</div>`;
    const barsDiv = document.createElement('div');
    barsDiv.className = 'ctrl-bars';
    BANDS.forEach((band, bi) => {
      const row = document.createElement('div');
      row.className = 'bar-row';
      row.innerHTML = `
        <div class="bar-tier" style="color:${band.color}">${band.label}</div>
        <div class="bar-track">
          <div class="bar-fill" id="f-${ci}-${bi}" style="width:0%;background:${band.color}">
            <div class="bar-inner" id="fi-${ci}-${bi}" style="color:${band.text}"></div>
          </div>
        </div>
        <div class="bar-pct" id="fp-${ci}-${bi}" style="color:${band.color}">—</div>
        <div class="bar-n"   id="fn-${ci}-${bi}"></div>
      `;
      barsDiv.appendChild(row);
    });
    block.appendChild(idDiv);
    block.appendChild(barsDiv);
    col.appendChild(block);
    if (ci < CONTROLS.length-1) {
      const d = document.createElement('div');
      d.className = 'ctrl-divider';
      col.appendChild(d);
    }
  });
}

// ── Render ────────────────────────────────────────────────────────────────
function render(data) {
  const n = data.length;

  // Counter
  if (n > prevCount) {
    const el = document.getElementById('counterNum');
    el.textContent = n;
    el.classList.add('flash');
    setTimeout(()=>el.classList.remove('flash'), 400);
    if (prevCount > 0) toast(`+1 new response · ${n} total`);
  } else {
    document.getElementById('counterNum').textContent = n;
  }

  if (n === 0) {
    document.getElementById('waitingState').style.display = 'flex';
    document.getElementById('mainContent').style.display  = 'none';
    prevCount = 0;
    return;
  }

  // Calculate room majority stage
  let stageCounts = [0, 0, 0, 0]; // Planning, Implementing, Operationalizing, Optimizing
  data.forEach(r => {
    const avg = r.scores.reduce((a,b) => a+b, 0) / r.scores.length;
    if (avg < 1) stageCounts[0]++;
    else if (avg < 2) stageCounts[1]++;
    else if (avg < 3) stageCounts[2]++;
    else stageCounts[3]++;
  });
  const maxCount = Math.max(...stageCounts);
  const majorityIdx = stageCounts.indexOf(maxCount);
  const stageNames = ["Planning", "Implementing", "Operationalizing", "Optimizing"];
  const stageColors = ["#FFB300", "#00C78D", "#00CAC5", "#FFFFFF"];
  const majLabel = document.getElementById('majorityLabel');
  majLabel.textContent = stageNames[majorityIdx];
  majLabel.style.color = stageColors[majorityIdx];

  document.getElementById('waitingState').style.display = 'none';
  document.getElementById('mainContent').style.display  = 'flex';

  if (!builtUI) { buildUI(); builtUI = true; }

  const isNew = n > prevCount;

  // Controls
  CONTROLS.forEach((ctrl, ci) => {
    BANDS.forEach((band, bi) => {
      const count = data.filter(r => band.scores.includes(r.scores[ci])).length;
      const pct   = (count / n) * 100;
      const fill  = document.getElementById('f-'  + ci + '-' + bi);
      const inner = document.getElementById('fi-' + ci + '-' + bi);
      const pctEl = document.getElementById('fp-' + ci + '-' + bi);
      const nEl   = document.getElementById('fn-' + ci + '-' + bi);
      const prev  = parseFloat(fill.style.width) || 0;
      const moved = isNew && Math.abs(pct - prev) > 0.5;
      fill.style.width = pct + '%';
      if (moved) {
        fill.classList.remove('flash');
        void fill.offsetWidth;
        fill.classList.add('flash');
      }
      inner.textContent = count > 0 ? count : '';
      pctEl.textContent = pct > 0 ? Math.round(pct) + '%' : '—';
      pctEl.style.color = pct > 0 ? band.color : '#2A4040';
      nEl.textContent   = count > 0 ? count + '/' + n : '';
    });
  });

  // Industry panel
  const counts = {};
  data.forEach(r => { counts[r.industry] = (counts[r.industry]||0)+1; });
  const sorted = Object.entries(counts).sort((a,b)=>b[1]-a[1]);
  const maxCnt = sorted[0]?.[1] || 1;
  const indList = document.getElementById('industryList');
  indList.innerHTML = '';
  sorted.forEach(([ind, cnt], i) => {
    const color = IND_COLORS[i % IND_COLORS.length];
    const pct   = Math.round((cnt/n)*100);
    const div   = document.createElement('div');
    div.className = 'ind-row';
    div.style.background = color + '14';
    div.innerHTML = `
      <div>
        <div class="ind-name" style="color:${color}">${ind}</div>
        <div class="ind-bar-wrap">
          <div class="ind-bar-fill" style="width:${(cnt/maxCnt)*100}%;background:${color}"></div>
        </div>
      </div>
      <div class="ind-count" style="color:${color}">${cnt}&nbsp;<span style="font-size:9px;opacity:.6">${pct}%</span></div>
    `;
    indList.appendChild(div);
  });



  prevCount = n;
}

// ── Init ──────────────────────────────────────────────────────────────────
if (CONFIG.MOCK_MODE) {
  document.getElementById('mockBadge').style.display = 'block';
}

async function tick() {
  const data = await loadRoom();
  render(data);
}

tick();
setInterval(tick, CONFIG.MOCK_MODE ? 4000 : CONFIG.POLL_INTERVAL);
</script>
</body>
</html>
